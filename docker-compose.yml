version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dispo_postgres
    environment:
      POSTGRES_USER: dispo_user
      POSTGRES_PASSWORD: dispo_pass
      POSTGRES_DB: dispo_platform
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dispo_user -d dispo_platform']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dispo_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: dispo_api
    ports:
      - '3001:3001'
    environment:
      - DATABASE_URL=postgresql://dispo_user:dispo_pass@postgres:5432/dispo_platform
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
    env_file:
      - ./apps/api/.env
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: npm run start:dev

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: dispo_web
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NODE_ENV=development
    env_file:
      - ./apps/web/.env.local
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
